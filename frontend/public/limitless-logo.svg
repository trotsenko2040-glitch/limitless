  <g filter="url(#wordmarkGlow)">
    <text x="18" y="156" fill="url(#wordmarkFill)" font-family="'Segoe UI', Arial, sans-serif" font-size="142" font-weight="900" letter-spacing="18">LIMITLESS</text>
