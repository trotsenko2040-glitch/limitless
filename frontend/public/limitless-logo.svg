<svg width="1240" height="220" viewBox="0 0 1240 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordmarkFill" x1="14" y1="58" x2="1132" y2="186" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7DDFF"/>
      <stop offset="0.45" stop-color="#B692FF"/>
      <stop offset="1" stop-color="#6E38EF"/>
    </linearGradient>
    <filter id="wordmarkGlow" x="0" y="0" width="1240" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="12" result="effect1_foregroundBlur"/>
