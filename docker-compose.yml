services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    environment:
      SITE_HOST: ${SITE_HOST}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build:
      context: ./rust-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      BOT_API_URL: http://telegram-bot:3001
      BOT_INTERNAL_API_KEY: ${BOT_INTERNAL_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_TERMINAL_PASSWORD: ${ADMIN_TERMINAL_PASSWORD}
      ADMIN_ACCESS_TOKEN: ${ADMIN_ACCESS_TOKEN}
      BACKEND_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PROMPT_CONFIG_PATH: /data/prompt-config.json
      ACCOUNT_STORE_PATH: /data/account-store
    restart: unless-stopped
    volumes:
      - backend_data:/data

  telegram-bot:
    build:
      context: ./telegram-bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
      PAY_SUPPORT_CONTACT: ${PAY_SUPPORT_CONTACT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_DB_PATH: /data/auth.db
      LEGACY_JSON_PATH: /data/tokens_db.json
      BOT_INTERNAL_API_KEY: ${BOT_INTERNAL_API_KEY}
    restart: unless-stopped
    volumes:
      - telegram_bot_data:/data

  support-bot:
    build:
      context: ./telegram-support-bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPPORT_API_PORT: 3002
      SUPPORT_BOT_TOKEN: ${SUPPORT_BOT_TOKEN}
      SUPPORT_BOT_OWNER_ID: ${SUPPORT_BOT_OWNER_ID}
      SUPPORT_RETRY_INTERVAL_SECONDS: ${SUPPORT_RETRY_INTERVAL_SECONDS}
      SUPPORT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SUPPORT_DB_PATH: /data/support.db
    restart: unless-stopped
    volumes:
      - support_bot_data:/data

volumes:
  postgres_data:
  backend_data:
  telegram_bot_data:
  support_bot_data:
  caddy_data:
  caddy_config:
